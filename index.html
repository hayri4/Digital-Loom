<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Loom — Weaving Draft Generator</title>
<meta name="description" content="Open-source interactive weaving draft generator.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  color-scheme:light dark;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#5c5c5c;
  --color-text-tertiary:#969696;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f2f2f0;
  --color-border-primary:rgba(0,0,0,0.28);
  --color-border-secondary:rgba(0,0,0,0.18);
  --color-border-tertiary:rgba(0,0,0,0.10);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-mono:'SF Mono','Fira Code','Courier New',monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-text-primary:#ebebeb;--color-text-secondary:#a0a0a0;
    --color-text-tertiary:#606060;--color-background-primary:#1c1c1c;
    --color-background-secondary:#272727;
    --color-border-primary:rgba(255,255,255,0.28);
    --color-border-secondary:rgba(255,255,255,0.18);
    --color-border-tertiary:rgba(255,255,255,0.10);
  }
}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);line-height:1.5;min-height:100vh;}
.page{max-width:1440px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
.page-header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);}
.page-header h1{font-size:22px;font-weight:500;letter-spacing:-0.01em;}
.page-header p{font-size:13px;color:var(--color-text-secondary);margin-top:4px;}
.page-header a{font-size:12px;color:var(--color-text-tertiary);text-decoration:none;}
.page-header a:hover{color:var(--color-text-primary);}
.page-footer{margin-top:3rem;padding-top:1.25rem;border-top:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-tertiary);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.page-footer a{color:var(--color-text-secondary);text-decoration:none;}
.page-footer a:hover{text-decoration:underline;color:var(--color-text-primary);}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
input[type=range]{accent-color:var(--color-text-primary);cursor:pointer;}
button:focus-visible,input:focus-visible{outline:2px solid var(--color-border-primary);outline-offset:1px;}

/* Two-column desktop layout */
.loom-wrap{display:flex;flex-direction:column;gap:1.5rem;align-items:flex-start;}
.loom-right{width:100%;}
@media(min-width:960px){
  .loom-wrap{flex-direction:row;gap:3rem;align-items:flex-start;}
  .loom-left{flex-shrink:0;}
  .loom-right{
    flex:1;min-width:280px;
    position:sticky;top:1.5rem;
    overflow-x:auto;
  }
}
</style>
</head>
<body>
<div class="page">
  <header class="page-header">
    <div>
      <h1>Digital Loom</h1>
      <p>Open-source weaving draft generator</p>
      <p style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">Designed by Hayri Dortdivanlioglu, 2026 &middot; Developed on Claude Sonnet 4.6 based on Glassner (2002)</p>
    </div>
    <a href="https://github.com/YOUR-USERNAME/digital-loom" target="_blank" rel="noopener">View on GitHub &rarr;</a>
  </header>
  <main id="root"></main>
  <footer class="page-footer">
    <span>Digital Loom &middot; MIT License &middot; <a href="https://github.com/YOUR-USERNAME/digital-loom" target="_blank" rel="noopener">Source on GitHub</a></span>
    <span>Weaving equation from Andrew Glassner, <em>IEEE CG&amp;A</em> 2002 &middot; Built with React</span>
  </footer>
</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useMemo,useEffect,useRef}=React;
const h=React.createElement;
const mat=(r,c,v=0)=>Array.from({length:r},()=>Array(c).fill(v));
const clone2D=m=>m.map(r=>[...r]);
function defS(sh,wp){const S=mat(sh,wp);for(let x=0;x<wp;x++)S[x%sh][x]=1;return S;}
function defR(wr,tr){const R=mat(wr,tr);for(let y=0;y<wr;y++)R[y][y%tr]=1;return R;}
function resizeS(S,oS,nS,wp){const N=mat(nS,wp);for(let x=0;x<wp;x++){let p=false;for(let s=0;s<Math.min(oS,nS);s++){if(S[s][x]){N[s][x]=1;p=true;break;}}if(!p)N[x%nS][x]=1;}return N;}
function resizeR(R,oT,nT,wr){const N=mat(wr,nT);for(let y=0;y<wr;y++)for(let t=0;t<Math.min(oT,nT);t++)N[y][t]=R[y][t];return N;}
function resizeT(T,oS,oT,nS,nT){const N=mat(nS,nT);for(let s=0;s<Math.min(oS,nS);s++)for(let t=0;t<Math.min(oT,nT);t++)N[s][t]=T[s][t];return N;}
function resizeWp(S,oW,nW,sh){const N=mat(sh,nW);for(let s=0;s<sh;s++)for(let x=0;x<Math.min(oW,nW);x++)N[s][x]=S[s][x];for(let x=0;x<nW;x++){let ok=false;for(let s=0;s<sh;s++)if(N[s][x]){ok=true;break;}if(!ok)N[x%sh][x]=1;}return N;}
function resizeWr(R,oW,nW,tr){const N=mat(nW,tr);for(let y=0;y<Math.min(oW,nW);y++)for(let t=0;t<tr;t++)N[y][t]=R[y][t];for(let y=oW;y<nW;y++)N[y][y%tr]=1;return N;}
function resizeArr(a,n,def){if(n<=a.length)return a.slice(0,n);return[...a,...Array(n-a.length).fill(a[a.length-1]??def)];}
function filterSel(set,max){return new Set([...set].filter(i=>i<max));}
function weave(S,R,T,sh,tr,wp,wr,W,H){
  const Sh=Array.from({length:wp},(_,x)=>{let b=0;for(let s=0;s<sh;s++)if(S[s][x])b|=1<<s;return b;});
  const Th=Array.from({length:tr},(_,t)=>{let b=0;for(let s=0;s<sh;s++)if(T[s][t])b|=1<<s;return b;});
  const Rh=Array.from({length:wr},(_,y)=>{let c=0;for(let t=0;t<tr;t++)if(R[y][t])c|=Th[t];return c;});
  return Array.from({length:H},(_,y)=>{const rc=Rh[y%wr];return Array.from({length:W},(_,x)=>(Sh[x%wp]&rc)!==0);});
}
const PALETTE=['#6B3A0A','#9B6010','#C89040','#E8C870','#0E2848','#1A3E7A','#3068B0','#6898CC','#3E1008','#7A2808','#B84820','#D88050','#083820','#0E6038','#2A9860','#68C098','#2A1040','#501880','#8840B8','#B878DC','#181818','#484848','#888888','#C8C8C8'];
const THICK_PX=[0,5,10,15,20,26];
const CANVAS_TP=[0,2,4,6,8,10];
const DRAFT_SP=[0,4,8,14,20];
const CANVAS_SP=[0,2,4,7,11];
const GAP_COL='#d4cfc8';
const CS=15,SW=10,GAP=6,TARGET=384;
const INIT_SH=4,INIT_TR=4,INIT_WP=8,INIT_WR=8;
const DEF_WARP='#9B6010',DEF_WEFT='#1A3E7A',DEF_T=3,DEF_S=0;

function buildDraftPNG(S,R,T,dF,sh,tr,wp,wr,warpC,weftC){
  const ECS=24,ESW=14,M=20,LH=20,IG=6;
  const x1=M,x2=M+wp*ECS+IG,x3=x2+tr*ECS+IG;
  const W=x3+ESW+M,H=M+LH+ESW+4+sh*ECS+IG+LH+wr*ECS+M;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  function cell(x,y,fill,stroke){ctx.fillStyle=fill;ctx.fillRect(x+.5,y+.5,ECS-1,ECS-1);ctx.strokeStyle=stroke||'#d0ccc8';ctx.lineWidth=.5;ctx.strokeRect(x+.5,y+.5,ECS-1,ECS-1);}
  function swH(x,y,w,col){ctx.fillStyle=col;ctx.fillRect(x+.5,y+.5,w-1,ESW-1);ctx.strokeStyle='#ccc';ctx.lineWidth=.5;ctx.strokeRect(x+.5,y+.5,w-1,ESW-1);}
  function swV(x,y,hh,col){ctx.fillStyle=col;ctx.fillRect(x+.5,y+.5,ESW-1,hh-1);ctx.strokeStyle='#ccc';ctx.lineWidth=.5;ctx.strokeRect(x+.5,y+.5,ESW-1,hh-1);}
  ctx.font='11px system-ui,sans-serif';ctx.fillStyle='#888';
  ctx.fillText('threading',x1,M+14);ctx.fillText('tie-up',x2,M+14);
  let y=M+LH;
  for(let c=0;c<wp;c++)swH(x1+c*ECS,y,ECS,warpC[c]);
  y+=ESW+4;
  for(let r=0;r<sh;r++)for(let c=0;c<wp;c++)cell(x1+c*ECS,y+r*ECS,S[r][c]?'#1a1a1a':'#f4f4f2');
  for(let r=0;r<sh;r++)for(let c=0;c<tr;c++)cell(x2+c*ECS,y+r*ECS,T[r][c]?'#1a1a1a':'#f4f4f2');
  y+=sh*ECS+IG;
  ctx.fillStyle='#888';ctx.fillText('drawdown',x1,y+14);ctx.fillText('treadling',x2,y+14);
  y+=LH;
  for(let r=0;r<wr;r++)for(let c=0;c<wp;c++)cell(x1+c*ECS,y+r*ECS,dF[r][c]?warpC[c]:weftC[r],'rgba(0,0,0,0.08)');
  for(let r=0;r<wr;r++)for(let c=0;c<tr;c++)cell(x2+c*ECS,y+r*ECS,R[r][c]?'#1a1a1a':'#f4f4f2');
  for(let r=0;r<wr;r++)swV(x3,y+r*ECS,ECS,weftC[r]);
  return cv;
}
function Grid({rows,cols,getVal,onClick,getColor}){
  const cells=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const v=getVal(r,c);
    const bg=getColor?getColor(r,c,v):(v?'var(--color-text-primary)':'var(--color-background-secondary)');
    cells.push(h('div',{key:`${r},${c}`,onClick:()=>onClick&&onClick(r,c),style:{width:CS,height:CS,boxSizing:'border-box',background:bg,border:'0.5px solid var(--color-border-tertiary)',cursor:onClick?'pointer':'default'}}));
  }
  return h('div',{style:{display:'grid',gridTemplateColumns:`repeat(${cols},${CS}px)`,gridTemplateRows:`repeat(${rows},${CS}px)`}},cells);
}
function Swatches({colors,selSet,onSelect,dir}){
  const isH=dir==='warp';
  return h('div',{style:{display:'flex',flexDirection:isH?'row':'column'}},
    colors.map((c,i)=>h('div',{key:i,onClick:()=>onSelect(i),style:{width:isH?CS:SW,height:isH?SW:CS,background:c,boxSizing:'border-box',cursor:'pointer',flexShrink:0,border:'0.5px solid var(--color-border-secondary)',outline:selSet.has(i)?'2px solid var(--color-text-primary)':'none',outlineOffset:'1px',position:'relative',zIndex:selSet.has(i)?1:0}}))
  );
}
function Stepper({label,value,min,max,onChange}){
  const [draft,setDraft]=useState(String(value));
  useEffect(()=>setDraft(String(value)),[value]);
  const commit=raw=>{const n=parseInt(raw,10);if(!isNaN(n))onChange(Math.min(max,Math.max(min,n)));else setDraft(String(value));};
  const btn=(sym,dis,fn)=>h('button',{onClick:fn,disabled:dis,style:{width:22,height:26,border:'0.5px solid var(--color-border-primary)',borderRadius:4,cursor:dis?'not-allowed':'pointer',background:'transparent',fontSize:14,color:'var(--color-text-primary)',display:'flex',alignItems:'center',justifyContent:'center',opacity:dis?0.3:1,padding:0,flexShrink:0}},sym);
  return h('div',{style:{display:'flex',alignItems:'center',gap:4}},
    h('span',{style:{fontSize:12,color:'var(--color-text-secondary)',minWidth:90,flexShrink:0}},label),
    btn('-',value<=min,()=>onChange(Math.max(min,value-1))),
    h('input',{type:'number',value:draft,min,max,onChange:ev=>setDraft(ev.target.value),onBlur:ev=>commit(ev.target.value),onKeyDown:ev=>{if(ev.key==='Enter')commit(ev.target.value);},style:{width:46,height:26,textAlign:'center',fontSize:13,fontWeight:500,border:'0.5px solid var(--color-border-primary)',borderRadius:4,background:'var(--color-background-primary)',color:'var(--color-text-primary)',boxSizing:'border-box',padding:0}}),
    btn('+',value>=max,()=>onChange(Math.min(max,value+1))),
    h('span',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginLeft:2}},`${min}-${max}`)
  );
}
function ThickPicker({shared,active,onPick}){
  return h('div',null,
    h('div',{style:{fontSize:11,color:'var(--color-text-secondary)',marginBottom:5}},'Thickness'+(active&&shared===null?' - mixed':'')),
    h('div',{style:{display:'flex',gap:4}},
      [1,2,3,4,5].map(t=>{const on=shared===t;return h('button',{key:t,onClick:()=>active&&onPick(t),title:`Thickness ${t}`,style:{width:32,height:32,border:`0.5px solid ${on?'var(--color-text-primary)':'var(--color-border-primary)'}`,borderRadius:5,background:on?'var(--color-background-secondary)':'transparent',cursor:active?'pointer':'default',opacity:active?1:0.28,display:'flex',alignItems:'center',justifyContent:'center',padding:0}},h('div',{style:{width:18,height:t*2+1,background:on?'var(--color-text-primary)':'var(--color-text-secondary)',borderRadius:1}}));})
    )
  );
}
function SpacingPicker({shared,active,onPick}){
  const GV=[1,4,7,11,15];
  return h('div',null,
    h('div',{style:{fontSize:11,color:'var(--color-text-secondary)',marginBottom:5}},'Spacing'+(active&&shared===null?' - mixed':'')),
    h('div',{style:{display:'flex',gap:4}},
      [0,1,2,3,4].map(s=>{const on=shared===s;const col=on?'var(--color-text-primary)':'var(--color-text-secondary)';return h('button',{key:s,onClick:()=>active&&onPick(s),title:`Spacing ${s}`,style:{width:32,height:32,border:`0.5px solid ${on?'var(--color-text-primary)':'var(--color-border-primary)'}`,borderRadius:5,background:on?'var(--color-background-secondary)':'transparent',cursor:active?'pointer':'default',opacity:active?1:0.28,display:'flex',alignItems:'center',justifyContent:'center',padding:0}},h('div',{style:{display:'flex',alignItems:'center',gap:GV[s]}},h('div',{style:{width:4,height:12,background:col,borderRadius:1}}),h('div',{style:{width:4,height:12,background:col,borderRadius:1}})));})
    )
  );
}

function DigitalLoom(){
  const [sh,setSh]=useState(INIT_SH);
  const [tr,setTr]=useState(INIT_TR);
  const [wp,setWp]=useState(INIT_WP);
  const [wr,setWr]=useState(INIT_WR);
  const [S,setS]=useState(()=>defS(INIT_SH,INIT_WP));
  const [R,setR]=useState(()=>defR(INIT_WR,INIT_TR));
  const [T,setT]=useState(()=>mat(INIT_SH,INIT_TR));
  const [warpC,setWarpC]=useState(()=>Array(INIT_WP).fill(DEF_WARP));
  const [weftC,setWeftC]=useState(()=>Array(INIT_WR).fill(DEF_WEFT));
  const [warpT,setWarpT]=useState(()=>Array(INIT_WP).fill(DEF_T));
  const [weftT,setWeftT]=useState(()=>Array(INIT_WR).fill(DEF_T));
  const [warpSp,setWarpSp]=useState(()=>Array(INIT_WP).fill(DEF_S));
  const [weftSp,setWeftSp]=useState(()=>Array(INIT_WR).fill(DEF_S));
  const [selType,setSelType]=useState(null);
  const [selSet,setSelSet]=useState(new Set());
  const [scale,setScale]=useState(1);
  const cvRef=useRef(null);

  const dF=useMemo(()=>weave(S,R,T,sh,tr,wp,wr,wp,wr),[S,R,T,sh,tr,wp,wr]);

  useEffect(()=>{
    const cv=cvRef.current;if(!cv)return;
    const sc=scale;
    const tW=i=>Math.max(1,Math.round(CANVAS_TP[warpT[i%wp]]*sc));
    const gW=i=>Math.round(CANVAS_SP[warpSp[i%wp]]*sc);
    const tH=i=>Math.max(1,Math.round(CANVAS_TP[weftT[i%wr]]*sc));
    const gH=i=>Math.round(CANVAS_SP[weftSp[i%wr]]*sc);
    // Always render exactly TARGET x TARGET — count enough threads to fill the window
    cv.width=TARGET; cv.height=TARGET;
    let cW=0,xTot=0; while(xTot<TARGET&&cW<2000){xTot+=tW(cW)+gW(cW);cW++;}
    let cH=0,yTot=0; while(yTot<TARGET&&cH<2000){yTot+=tH(cH)+gH(cH);cH++;}
    const fab=weave(S,R,T,sh,tr,wp,wr,cW,cH);
    const xs=[],xw=[];let xc=0;
    for(let x=0;x<cW;x++){xs.push(xc);const tw=tW(x)+gW(x);xw.push(tw);xc+=tw;}
    const ys=[],yh=[];let yc=0;
    for(let y=0;y<cH;y++){ys.push(yc);const th=tH(y)+gH(y);yh.push(th);yc+=th;}
    const ctx=cv.getContext('2d');
    ctx.fillStyle=GAP_COL;ctx.fillRect(0,0,TARGET,TARGET);
    for(let y=0;y<cH;y++){
      if(ys[y]>=TARGET)break;
      for(let x=0;x<cW;x++){
        if(xs[x]>=TARGET)break;
        const wo=fab[y][x],wC=warpC[x%wp],wfC=weftC[y%wr];
        const cellW=Math.min(xw[x],TARGET-xs[x]),cellH=Math.min(yh[y],TARGET-ys[y]);
        const tw=Math.max(1,Math.min(tW(x),cellW-2)),th=Math.max(1,Math.min(tH(y),cellH-2));
        const ox=(xw[x]-tw)>>1,oy=(yh[y]-th)>>1;
        if(wo){ctx.fillStyle=wfC;ctx.fillRect(xs[x],ys[y]+oy,cellW,th);ctx.fillStyle=wC;ctx.fillRect(xs[x]+ox,ys[y],tw,cellH);}
        else{ctx.fillStyle=wC;ctx.fillRect(xs[x]+ox,ys[y],tw,cellH);ctx.fillStyle=wfC;ctx.fillRect(xs[x],ys[y]+oy,cellW,th);}
      }
    }
  },[S,R,T,sh,tr,wp,wr,warpC,weftC,warpT,weftT,warpSp,weftSp,scale]);

  const downloadDraft=()=>{
    const cv=buildDraftPNG(S,R,T,dF,sh,tr,wp,wr,warpC,weftC);
    const a=document.createElement('a');a.download='weaving-draft.png';a.href=cv.toDataURL('image/png');a.click();
  };
  const downloadSim=()=>{
    const cv=cvRef.current;if(!cv)return;
    const a=document.createElement('a');a.download='weaving-simulation.png';a.href=cv.toDataURL('image/png');a.click();
  };

  const clrSel=(type,max)=>{if(selType===type){const f=filterSel(selSet,max);if(f.size===0){setSelType(null);setSelSet(new Set());}else setSelSet(f);}};
  const chSh=v=>{setS(p=>resizeS(p,sh,v,wp));setT(p=>resizeT(p,sh,tr,v,tr));setSh(v);};
  const chTr=v=>{setR(p=>resizeR(p,tr,v,wr));setT(p=>resizeT(p,sh,tr,sh,v));setTr(v);};
  const chWp=v=>{setS(p=>resizeWp(p,wp,v,sh));setWarpC(p=>resizeArr(p,v,DEF_WARP));setWarpT(p=>resizeArr(p,v,DEF_T));setWarpSp(p=>resizeArr(p,v,DEF_S));clrSel('warp',v);setWp(v);};
  const chWr=v=>{setR(p=>resizeWr(p,wr,v,tr));setWeftC(p=>resizeArr(p,v,DEF_WEFT));setWeftT(p=>resizeArr(p,v,DEF_T));setWeftSp(p=>resizeArr(p,v,DEF_S));clrSel('weft',v);setWr(v);};
  const clkS=(s,x)=>setS(p=>{const n=clone2D(p);for(let i=0;i<sh;i++)n[i][x]=0;n[s][x]=1;return n;});
  const clkR=(y,t)=>setR(p=>{const n=clone2D(p);n[y][t]^=1;return n;});
  const clkT=(s,t)=>setT(p=>{const n=clone2D(p);n[s][t]^=1;return n;});
  const clickSwatch=(type,idx)=>{
    if(selType&&selType!==type){setSelType(type);setSelSet(new Set([idx]));return;}
    const next=new Set(selSet);
    if(next.has(idx))next.delete(idx);else next.add(idx);
    if(next.size===0){setSelType(null);setSelSet(new Set());}else{setSelType(type);setSelSet(next);}
  };
  const applyProp=(setter,val)=>{if(!selSet.size)return;setter(p=>{const n=[...p];selSet.forEach(i=>n[i]=val);return n;});};
  const pickColor  =col=>applyProp(selType==='warp'?setWarpC:setWeftC,col);
  const pickThick  =t  =>applyProp(selType==='warp'?setWarpT:setWeftT,t);
  const pickSpacing=s  =>applyProp(selType==='warp'?setWarpSp:setWeftSp,s);
  const selectAll  =()=>{if(!selType)return;const len=selType==='warp'?wp:wr;setSelSet(new Set(Array.from({length:len},(_,i)=>i)));};
  const deselectAll=()=>{setSelType(null);setSelSet(new Set());};

  const hasSel=selSet.size>0;
  const sortedIdx=[...selSet].sort((a,b)=>a-b);
  const selColors=sortedIdx.map(i=>selType==='warp'?warpC[i]:weftC[i]);
  const selThicks=sortedIdx.map(i=>selType==='warp'?warpT[i]:weftT[i]);
  const selSpaces=sortedIdx.map(i=>selType==='warp'?warpSp[i]:weftSp[i]);
  const allSameC=selColors.length>0&&selColors.every(c=>c===selColors[0]);
  const allSameT=selThicks.length>0&&selThicks.every(t=>t===selThicks[0]);
  const allSameSp=selSpaces.length>0&&selSpaces.every(s=>s===selSpaces[0]);
  const sharedColor=allSameC?selColors[0]:null;
  const sharedThick=allSameT?selThicks[0]:null;
  const sharedSpace=allSameSp?selSpaces[0]:null;
  const MAX_CHIPS=14;

  const lbl=(txt,w)=>h('div',{style:{width:w,fontSize:11,color:'var(--color-text-secondary)',height:16,display:'flex',alignItems:'flex-end'}},txt);
  const smBtn=(txt,fn,dim)=>h('button',{onClick:fn,style:{padding:'4px 10px',fontSize:11,borderRadius:5,cursor:'pointer',background:'transparent',border:`0.5px solid ${dim?'var(--color-border-secondary)':'var(--color-border-primary)'}`,color:'var(--color-text-secondary)',textAlign:'left'}},txt);
  const dlBtn=(label,fn)=>h('button',{onClick:fn,style:{padding:'5px 12px',fontSize:12,borderRadius:6,cursor:'pointer',background:'transparent',border:'0.5px solid var(--color-border-primary)',color:'var(--color-text-secondary)',display:'flex',alignItems:'center',gap:5,flexShrink:0}},h('span',{style:{fontSize:14,lineHeight:1}},'&#8595;'),label);
  const divider=h('div',{style:{borderTop:'0.5px solid var(--color-border-tertiary)',margin:'8px 0'}});
  const scaleLabel=`${scale}\u00D7`;

  // ── Draft section ──────────────────────────────────────────────
  const draftSection=h('div',{style:{display:'flex',flexDirection:'column',gap:0}},
    h('div',{style:{display:'flex',gap:GAP,marginBottom:4}},
      h('div',null,
        h('div',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:3}},'warp threads \u2014 click to select'),
        h(Swatches,{colors:warpC,selSet:selType==='warp'?selSet:new Set(),onSelect:i=>clickSwatch('warp',i),dir:'warp'})
      ),
      h('div',{style:{width:tr*CS}})
    ),
    h('div',{style:{display:'flex',gap:GAP,marginBottom:2}},lbl(`threading \u00B7 ${sh} shafts`,wp*CS),lbl(`tie-up \u00B7 ${tr} treadles`,tr*CS)),
    h('div',{style:{display:'flex',gap:GAP,marginBottom:GAP}},
      h(Grid,{rows:sh,cols:wp,getVal:(s,x)=>S[s][x],onClick:clkS}),
      h(Grid,{rows:sh,cols:tr,getVal:(s,t)=>T[s][t],onClick:clkT})
    ),
    h('div',{style:{display:'flex',gap:GAP,marginBottom:2}},lbl('drawdown',wp*CS),lbl('treadling \u00B7 multi-pick',tr*CS)),
    h('div',{style:{display:'flex',gap:GAP,alignItems:'flex-start'}},
      h(Grid,{rows:wr,cols:wp,getVal:(y,x)=>dF[y][x],getColor:(y,x,v)=>v?warpC[x]:weftC[y]}),
      h(Grid,{rows:wr,cols:tr,getVal:(y,t)=>R[y][t],onClick:clkR}),
      h(Swatches,{colors:weftC,selSet:selType==='weft'?selSet:new Set(),onSelect:i=>clickSwatch('weft',i),dir:'weft'})
    ),
    h('div',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginTop:3}},'\u2191 weft threads \u2014 click to select'),
    h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',marginTop:5,lineHeight:1.6}},
      'Threading: one per column \u00B7 Treadling: multi-pick \u00B7 Tie-up: toggle freely'
    ),
    h('div',{style:{marginTop:12}},dlBtn('Download draft PNG',downloadDraft))
  );

  // ── Thread editor panel ────────────────────────────────────────
  const editorPanel=h('div',{style:{display:'flex',flexDirection:'column',gap:0,width:186,paddingTop:16}},
    h('div',{style:{marginBottom:8}},
      h('div',{style:{fontSize:12,fontWeight:500,color:'var(--color-text-primary)',marginBottom:2}},
        hasSel?`${selSet.size} ${selType} thread${selSet.size>1?'s':''} selected`:'Thread editor'),
      hasSel
        ?h('div',{style:{display:'flex',flexWrap:'wrap',gap:3}},
            selColors.slice(0,MAX_CHIPS).map((c,i)=>h('div',{key:i,title:`Thread ${sortedIdx[i]+1}`,style:{width:13,height:13,background:c,borderRadius:2,border:'0.5px solid var(--color-border-secondary)'}})),
            selColors.length>MAX_CHIPS&&h('span',{style:{fontSize:10,color:'var(--color-text-tertiary)',alignSelf:'center'}},`+${selColors.length-MAX_CHIPS}`))
        :h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',lineHeight:1.6}},'Click thread swatches to select.')
    ),
    hasSel&&h('div',{style:{marginBottom:6}},
      allSameC
        ?h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'4px 7px',marginBottom:6,border:'0.5px solid var(--color-border-tertiary)',borderRadius:5,background:'var(--color-background-secondary)'}},
            h('div',{style:{width:14,height:14,background:sharedColor,borderRadius:2,flexShrink:0,border:'0.5px solid var(--color-border-secondary)'}}),
            h('span',{style:{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--color-text-secondary)'}},sharedColor&&sharedColor.toUpperCase()))
        :h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',fontStyle:'italic',marginBottom:6}},'Mixed colors')
    ),
    h('div',{style:{fontSize:11,color:'var(--color-text-secondary)',marginBottom:5}},'Color'),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,24px)',gap:3,marginBottom:8,opacity:hasSel?1:0.28}},
      PALETTE.map(c=>h('div',{key:c,onClick:()=>pickColor(c),style:{width:24,height:24,background:c,borderRadius:3,boxSizing:'border-box',cursor:hasSel?'pointer':'default',border:c===sharedColor?'2.5px solid var(--color-text-primary)':'2.5px solid transparent'}}))
    ),
    divider,
    h('div',{style:{opacity:hasSel?1:0.28,marginBottom:8}},h(ThickPicker,{shared:sharedThick,active:hasSel,onPick:pickThick})),
    divider,
    h('div',{style:{opacity:hasSel?1:0.28,marginBottom:8}},h(SpacingPicker,{shared:sharedSpace,active:hasSel,onPick:pickSpacing})),
    hasSel&&h('div',null,
      divider,
      h('div',{style:{display:'flex',flexDirection:'column',gap:5}},
        smBtn(`Select all ${selType} threads`,selectAll,false),
        smBtn('Deselect all',deselectAll,true)
      )
    )
  );

  // ── Simulation panel ───────────────────────────────────────────
  const simPanel=h('div',null,
    h('div',{style:{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:4}},
      'Simulated cloth'),
    h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginBottom:10}},
      'Over-under interlacing with thread thickness and spacing applied'),
    // Fixed-size window — canvas renders inside, layout never jumps
    h('div',{style:{
        width:TARGET+'px',height:TARGET+'px',
        overflow:'hidden',flexShrink:0,
        borderRadius:4,border:'0.5px solid var(--color-border-tertiary)',
        background:GAP_COL,marginBottom:10,
    }},
      h('canvas',{ref:cvRef,style:{display:'block'}})
    ),
    // Scale LEFT · Download RIGHT — always anchored below the fixed window
    h('div',{style:{display:'flex',alignItems:'center',gap:10,width:TARGET+'px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}},
        h('span',{style:{fontSize:11,color:'var(--color-text-tertiary)',whiteSpace:'nowrap'}},'Scale'),
        h('input',{type:'range',min:'0.25',max:'4',step:'0.25',value:scale,
          onChange:ev=>setScale(parseFloat(ev.target.value)),
          style:{flex:1}}),
        h('span',{style:{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--color-text-primary)',minWidth:32,textAlign:'right'}},scaleLabel)
      ),
      dlBtn('Download PNG',downloadSim)
    )
  );

  return h('div',{style:{fontFamily:'var(--font-sans)'}},
    // Steppers — always full width
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 10px',marginBottom:'1.5rem',padding:'12px 14px',border:'0.5px solid var(--color-border-tertiary)',borderRadius:8,background:'var(--color-background-secondary)'}},
      h(Stepper,{label:'Shafts',value:sh,min:2,max:16,onChange:chSh}),
      h(Stepper,{label:'Warp repeat',value:wp,min:2,max:32,onChange:chWp}),
      h(Stepper,{label:'Treadles',value:tr,min:2,max:16,onChange:chTr}),
      h(Stepper,{label:'Weft repeat',value:wr,min:2,max:32,onChange:chWr}),
      h('div',{style:{gridColumn:'1/-1',display:'flex',gap:8,paddingTop:4,borderTop:'0.5px solid var(--color-border-tertiary)',marginTop:2,flexWrap:'wrap'}},
        smBtn('Clear tie-up',()=>setT(mat(sh,tr)),true),
        smBtn('Reset all',()=>{setS(defS(sh,wp));setR(defR(wr,tr));setT(mat(sh,tr));},true)
      )
    ),

    // Two-column responsive layout
    h('div',{className:'loom-wrap'},

      // LEFT: draft + thread editor
      h('div',{className:'loom-left'},
        h('div',{style:{display:'flex',gap:24,alignItems:'flex-start',flexWrap:'wrap'}},
          draftSection,
          editorPanel
        )
      ),

      // RIGHT: simulation (sticky on desktop)
      h('div',{className:'loom-right'},simPanel)

    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(DigitalLoom));
</script>
</body>
</html>
