<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Loom — Weaving Draft Generator</title>
<meta name="description" content="An open-source interactive weaving draft generator. Design threading, treadling, and tie-up patterns, combine treadles, and color individual threads.">
<meta property="og:title" content="Digital Loom">
<meta property="og:description" content="Open-source interactive weaving draft generator.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  color-scheme: light dark;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #5c5c5c;
  --color-text-tertiary: #969696;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f2f2f0;
  --color-border-primary: rgba(0,0,0,0.28);
  --color-border-secondary: rgba(0,0,0,0.18);
  --color-border-tertiary: rgba(0,0,0,0.10);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono','Fira Code','Fira Mono','Courier New',monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary: #ebebeb;
    --color-text-secondary: #a0a0a0;
    --color-text-tertiary: #606060;
    --color-background-primary: #1c1c1c;
    --color-background-secondary: #272727;
    --color-border-primary: rgba(255,255,255,0.28);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-tertiary: rgba(255,255,255,0.10);
  }
}

body {
  font-family: var(--font-sans);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

.page {
  max-width: 980px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

.page-header {
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.page-header h1 {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.page-header p {
  font-size: 13px;
  color: var(--color-text-secondary);
}

.page-header a {
  font-size: 12px;
  color: var(--color-text-tertiary);
  text-decoration: none;
}
.page-header a:hover { color: var(--color-text-primary); }

.page-footer {
  margin-top: 3rem;
  padding-top: 1.25rem;
  border-top: 0.5px solid var(--color-border-tertiary);
  font-size: 12px;
  color: var(--color-text-tertiary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.page-footer a {
  color: var(--color-text-secondary);
  text-decoration: none;
}
.page-footer a:hover {
  color: var(--color-text-primary);
  text-decoration: underline;
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; appearance: textfield; }

button:focus-visible, input:focus-visible {
  outline: 2px solid var(--color-border-primary);
  outline-offset: 1px;
}
</style>
</head>
<body>
<div class="page">

  <header class="page-header">
    <div>
      <h1>Digital Loom</h1>
      <p style="margin-top:4px">Open-source weaving draft generator — based on Glassner (2002)</p>
    </div>
    <a href="https://github.com/YOUR-USERNAME/digital-loom" target="_blank" rel="noopener">
      ★ Star on GitHub
    </a>
  </header>

  <main id="root"></main>

  <footer class="page-footer">
    <span>Digital Loom · MIT License · <a href="https://github.com/YOUR-USERNAME/digital-loom" target="_blank" rel="noopener">Source on GitHub</a></span>
    <span>Built with <a href="https://react.dev" target="_blank" rel="noopener">React</a> · Implements the weaving equation from Andrew Glassner, <em>IEEE CG&amp;A</em> 2002</span>
  </footer>

</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useMemo,useEffect,useRef}=React;
const h=React.createElement;

/* ── matrix helpers ─────────────────────────────────────────────── */
const mat=(r,c,v=0)=>Array.from({length:r},()=>Array(c).fill(v));
const clone2D=m=>m.map(r=>[...r]);
function defS(sh,wp){const S=mat(sh,wp);for(let x=0;x<wp;x++)S[x%sh][x]=1;return S;}
function defR(wr,tr){const R=mat(wr,tr);for(let y=0;y<wr;y++)R[y][y%tr]=1;return R;}

/* ── resize helpers ─────────────────────────────────────────────── */
function resizeS(S,oldSh,newSh,wp){
  const N=mat(newSh,wp);
  for(let x=0;x<wp;x++){let p=false;for(let s=0;s<Math.min(oldSh,newSh);s++){if(S[s][x]){N[s][x]=1;p=true;break;}}if(!p)N[x%newSh][x]=1;}
  return N;
}
function resizeR(R,oldTr,newTr,wr){
  const N=mat(wr,newTr);
  for(let y=0;y<wr;y++)for(let t=0;t<Math.min(oldTr,newTr);t++)N[y][t]=R[y][t];
  return N;
}
function resizeT(T,oldSh,oldTr,newSh,newTr){
  const N=mat(newSh,newTr);
  for(let s=0;s<Math.min(oldSh,newSh);s++)for(let t=0;t<Math.min(oldTr,newTr);t++)N[s][t]=T[s][t];
  return N;
}
function resizeWp(S,oldWp,newWp,sh){
  const N=mat(sh,newWp);
  for(let s=0;s<sh;s++)for(let x=0;x<Math.min(oldWp,newWp);x++)N[s][x]=S[s][x];
  for(let x=0;x<newWp;x++){let ok=false;for(let s=0;s<sh;s++)if(N[s][x]){ok=true;break;}if(!ok)N[x%sh][x]=1;}
  return N;
}
function resizeWr(R,oldWr,newWr,tr){
  const N=mat(newWr,tr);
  for(let y=0;y<Math.min(oldWr,newWr);y++)for(let t=0;t<tr;t++)N[y][t]=R[y][t];
  for(let y=oldWr;y<newWr;y++)N[y][y%tr]=1;
  return N;
}
function resizeColors(arr,newLen,def){
  if(newLen<=arr.length)return arr.slice(0,newLen);
  return[...arr,...Array(newLen-arr.length).fill(arr[arr.length-1]||def)];
}
function filterSel(set,max){return new Set([...set].filter(i=>i<max));}

/* ── weaving equation (multi-treadle per weft row) ──────────────── */
function weave(S,R,T,sh,tr,wp,wr,W,H){
  const Sh=Array.from({length:wp},(_,x)=>{let b=0;for(let s=0;s<sh;s++)if(S[s][x])b|=1<<s;return b;});
  const Th=Array.from({length:tr},(_,t)=>{let b=0;for(let s=0;s<sh;s++)if(T[s][t])b|=1<<s;return b;});
  const Rh=Array.from({length:wr},(_,y)=>{let c=0;for(let t=0;t<tr;t++)if(R[y][t])c|=Th[t];return c;});
  return Array.from({length:H},(_,y)=>{
    const rc=Rh[y%wr];
    return Array.from({length:W},(_,x)=>(Sh[x%wp]&rc)!==0);
  });
}

/* ── colour palette ─────────────────────────────────────────────── */
const PALETTE=[
  '#6B3A0A','#9B6010','#C89040','#E8C870',
  '#0E2848','#1A3E7A','#3068B0','#6898CC',
  '#3E1008','#7A2808','#B84820','#D88050',
  '#083820','#0E6038','#2A9860','#68C098',
  '#2A1040','#501880','#8840B8','#B878DC',
  '#181818','#484848','#888888','#C8C8C8',
];

const CS=15, SW=10, GAP=6, FW=64, FH=64, FC=6;
const INIT_SH=4, INIT_TR=4, INIT_WP=8, INIT_WR=8;
const DEF_WARP='#9B6010', DEF_WEFT='#1A3E7A';

/* ── Grid ───────────────────────────────────────────────────────── */
function Grid({rows,cols,getVal,onClick,getColor}){
  const cells=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const v=getVal(r,c);
    const bg=getColor?getColor(r,c,v):(v?'var(--color-text-primary)':'var(--color-background-secondary)');
    cells.push(h('div',{key:`${r},${c}`,onClick:()=>onClick&&onClick(r,c),style:{
      width:CS,height:CS,boxSizing:'border-box',background:bg,
      border:'0.5px solid var(--color-border-tertiary)',
      cursor:onClick?'pointer':'default',
    }}));
  }
  return h('div',{style:{display:'grid',gridTemplateColumns:`repeat(${cols},${CS}px)`,gridTemplateRows:`repeat(${rows},${CS}px)`}},cells);
}

/* ── Stepper (±  buttons + text input) ─────────────────────────── */
function Stepper({label,value,min,max,onChange}){
  const [draft,setDraft]=useState(String(value));
  useEffect(()=>setDraft(String(value)),[value]);
  const commit=raw=>{const n=parseInt(raw,10);if(!isNaN(n))onChange(Math.min(max,Math.max(min,n)));else setDraft(String(value));};
  const btn=(sym,disabled,fn)=>h('button',{onClick:fn,disabled,style:{
    width:22,height:26,border:'0.5px solid var(--color-border-primary)',borderRadius:4,
    cursor:disabled?'not-allowed':'pointer',background:'transparent',fontSize:14,lineHeight:1,
    color:'var(--color-text-primary)',display:'flex',alignItems:'center',justifyContent:'center',
    opacity:disabled?0.3:1,padding:0,flexShrink:0,
  }},sym);
  return h('div',{style:{display:'flex',alignItems:'center',gap:4}},
    h('span',{style:{fontSize:12,color:'var(--color-text-secondary)',minWidth:90,flexShrink:0}},label),
    btn('−',value<=min,()=>onChange(Math.max(min,value-1))),
    h('input',{
      type:'number',value:draft,min,max,
      onChange:ev=>setDraft(ev.target.value),
      onBlur:ev=>commit(ev.target.value),
      onKeyDown:ev=>{if(ev.key==='Enter')commit(ev.target.value);},
      style:{width:46,height:26,textAlign:'center',fontSize:13,fontWeight:500,
        border:'0.5px solid var(--color-border-primary)',borderRadius:4,
        background:'var(--color-background-primary)',color:'var(--color-text-primary)',
        boxSizing:'border-box',padding:0,fontFamily:'var(--font-sans)'},
    }),
    btn('+',value>=max,()=>onChange(Math.min(max,value+1))),
    h('span',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginLeft:2}},`${min}–${max}`)
  );
}

/* ── Thread swatches (multi-select) ─────────────────────────────── */
function Swatches({colors,selSet,onSelect,dir}){
  const isH=dir==='warp';
  return h('div',{style:{display:'flex',flexDirection:isH?'row':'column'}},
    colors.map((c,i)=>{
      const sel=selSet.has(i);
      return h('div',{key:i,onClick:()=>onSelect(i),style:{
        width:isH?CS:SW,height:isH?SW:CS,background:c,boxSizing:'border-box',cursor:'pointer',
        border:'0.5px solid var(--color-border-secondary)',
        outline:sel?'2px solid var(--color-text-primary)':'none',
        outlineOffset:'1px',position:'relative',zIndex:sel?1:0,
      }});
    })
  );
}

/* ── Main app ───────────────────────────────────────────────────── */
function DigitalLoom(){
  const [sh,setSh]=useState(INIT_SH);
  const [tr,setTr]=useState(INIT_TR);
  const [wp,setWp]=useState(INIT_WP);
  const [wr,setWr]=useState(INIT_WR);
  const [S,setS]=useState(()=>defS(INIT_SH,INIT_WP));
  const [R,setR]=useState(()=>defR(INIT_WR,INIT_TR));
  const [T,setT]=useState(()=>mat(INIT_SH,INIT_TR));
  const [warpC,setWarpC]=useState(()=>Array(INIT_WP).fill(DEF_WARP));
  const [weftC,setWeftC]=useState(()=>Array(INIT_WR).fill(DEF_WEFT));
  const [selType,setSelType]=useState(null);
  const [selSet,setSelSet]=useState(new Set());
  const cvRef=useRef(null);

  const dF=useMemo(()=>weave(S,R,T,sh,tr,wp,wr,wp,wr),[S,R,T,sh,tr,wp,wr]);
  const bF=useMemo(()=>weave(S,R,T,sh,tr,wp,wr,FW,FH),[S,R,T,sh,tr,wp,wr]);

  useEffect(()=>{
    const c=cvRef.current;if(!c)return;
    c.width=FW*FC;c.height=FH*FC;
    const ctx=c.getContext('2d');
    for(let y=0;y<FH;y++)for(let x=0;x<FW;x++){
      ctx.fillStyle=bF[y][x]?warpC[x%wp]:weftC[y%wr];
      ctx.fillRect(x*FC,y*FC,FC,FC);
    }
  },[bF,warpC,weftC,wp,wr]);

  /* size changes */
  const clrSel=(type,max)=>{if(selType===type){const f=filterSel(selSet,max);if(f.size===0){setSelType(null);setSelSet(new Set());}else setSelSet(f);}};
  const chSh=v=>{setS(p=>resizeS(p,sh,v,wp));setT(p=>resizeT(p,sh,tr,v,tr));setSh(v);};
  const chTr=v=>{setR(p=>resizeR(p,tr,v,wr));setT(p=>resizeT(p,sh,tr,sh,v));setTr(v);};
  const chWp=v=>{setS(p=>resizeWp(p,wp,v,sh));setWarpC(p=>resizeColors(p,v,DEF_WARP));clrSel('warp',v);setWp(v);};
  const chWr=v=>{setR(p=>resizeWr(p,wr,v,tr));setWeftC(p=>resizeColors(p,v,DEF_WEFT));clrSel('weft',v);setWr(v);};

  /* grid clicks */
  const clkS=(s,x)=>setS(p=>{const n=clone2D(p);for(let i=0;i<sh;i++)n[i][x]=0;n[s][x]=1;return n;});
  const clkR=(y,t)=>setR(p=>{const n=clone2D(p);n[y][t]^=1;return n;});
  const clkT=(s,t)=>setT(p=>{const n=clone2D(p);n[s][t]^=1;return n;});

  /* thread multi-select */
  const clickSwatch=(type,idx)=>{
    if(selType&&selType!==type){setSelType(type);setSelSet(new Set([idx]));return;}
    const next=new Set(selSet);
    if(next.has(idx))next.delete(idx);else next.add(idx);
    if(next.size===0){setSelType(null);setSelSet(new Set());}
    else{setSelType(type);setSelSet(next);}
  };

  const pickColor=col=>{
    if(!selSet.size)return;
    if(selType==='warp')setWarpC(p=>{const n=[...p];selSet.forEach(i=>n[i]=col);return n;});
    else setWeftC(p=>{const n=[...p];selSet.forEach(i=>n[i]=col);return n;});
  };
  const selectAll=()=>{if(!selType)return;const len=selType==='warp'?wp:wr;setSelSet(new Set(Array.from({length:len},(_,i)=>i)));};
  const deselectAll=()=>{setSelType(null);setSelSet(new Set());};

  /* Export canvas as PNG */
  const exportPNG=()=>{
    const c=cvRef.current;if(!c)return;
    const a=document.createElement('a');
    a.download='weaving-draft.png';
    a.href=c.toDataURL('image/png');
    a.click();
  };

  /* colour panel derived values */
  const sortedIdx=[...selSet].sort((a,b)=>a-b);
  const selColors=sortedIdx.map(i=>selType==='warp'?warpC[i]:weftC[i]);
  const allSame=selColors.length>0&&selColors.every(c=>c===selColors[0]);
  const sharedColor=allSame?selColors[0]:null;
  const hasSel=selSet.size>0;
  const MAX_CHIPS=16;

  const lbl=(txt,w)=>h('div',{style:{width:w,fontSize:11,color:'var(--color-text-secondary)',height:16,display:'flex',alignItems:'flex-end'}},txt);
  const smBtn=(txt,onClick,muted)=>h('button',{onClick,style:{
    padding:'4px 10px',fontSize:11,borderRadius:5,cursor:'pointer',
    background:'transparent',border:`0.5px solid ${muted?'var(--color-border-tertiary)':'var(--color-border-secondary)'}`,
    color:muted?'var(--color-text-tertiary)':'var(--color-text-secondary)',textAlign:'left',
  }},txt);

  return h('div',{style:{fontFamily:'var(--font-sans)'}},

    /* ── Steppers ── */
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 24px',marginBottom:'1.5rem',
        padding:'12px 14px',border:'0.5px solid var(--color-border-tertiary)',borderRadius:8,
        background:'var(--color-background-secondary)'}},
      h(Stepper,{label:'Shafts',value:sh,min:2,max:16,onChange:chSh}),
      h(Stepper,{label:'Warp repeat',value:wp,min:2,max:32,onChange:chWp}),
      h(Stepper,{label:'Treadles',value:tr,min:2,max:16,onChange:chTr}),
      h(Stepper,{label:'Weft repeat',value:wr,min:2,max:32,onChange:chWr}),
      h('div',{style:{gridColumn:'1/-1',display:'flex',gap:8,paddingTop:4,
          borderTop:'0.5px solid var(--color-border-tertiary)',marginTop:2,flexWrap:'wrap'}},
        smBtn('Clear tie-up',()=>setT(mat(sh,tr)),true),
        smBtn('Reset all',()=>{setS(defS(sh,wp));setR(defR(wr,tr));setT(mat(sh,tr));},true),
        h('div',{style:{marginLeft:'auto'}},
          smBtn('⬇ Export PNG',exportPNG,false)
        )
      )
    ),

    /* ── Draft + colour panel ── */
    h('div',{style:{display:'flex',gap:24,alignItems:'flex-start',flexWrap:'wrap',marginBottom:'1.5rem'}},

      /* draft */
      h('div',{style:{display:'flex',flexDirection:'column',gap:0}},

        /* warp swatches */
        h('div',{style:{display:'flex',gap:GAP,marginBottom:4}},
          h('div',null,
            h('div',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:3}},'warp threads — click to select (multi-select supported)'),
            h(Swatches,{colors:warpC,selSet:selType==='warp'?selSet:new Set(),onSelect:i=>clickSwatch('warp',i),dir:'warp'})
          ),
          h('div',{style:{width:tr*CS}})
        ),

        /* row 1: threading | tie-up */
        h('div',{style:{display:'flex',gap:GAP,marginBottom:2}},lbl(`threading · ${sh} shafts`,wp*CS),lbl(`tie-up · ${tr} treadles`,tr*CS)),
        h('div',{style:{display:'flex',gap:GAP,marginBottom:GAP}},
          h(Grid,{rows:sh,cols:wp,getVal:(s,x)=>S[s][x],onClick:clkS}),
          h(Grid,{rows:sh,cols:tr,getVal:(s,t)=>T[s][t],onClick:clkT})
        ),

        /* row 2: cloth | treadling | weft swatches */
        h('div',{style:{display:'flex',gap:GAP,marginBottom:2}},lbl('cloth preview',wp*CS),lbl('treadling · multi-pick',tr*CS)),
        h('div',{style:{display:'flex',gap:GAP,alignItems:'flex-start'}},
          h(Grid,{rows:wr,cols:wp,getVal:(y,x)=>dF[y][x],onClick:null,getColor:(y,x,v)=>v?warpC[x]:weftC[y]}),
          h(Grid,{rows:wr,cols:tr,getVal:(y,t)=>R[y][t],onClick:clkR}),
          h(Swatches,{colors:weftC,selSet:selType==='weft'?selSet:new Set(),onSelect:i=>clickSwatch('weft',i),dir:'weft'})
        ),
        h('div',{style:{fontSize:10,color:'var(--color-text-tertiary)',marginTop:3}},'↑ weft threads — click to select'),
        h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',marginTop:5,lineHeight:1.6}},
          'Threading: one per column · Treadling: toggle freely, combine any treadles · Tie-up: toggle freely'
        )
      ),

      /* colour panel */
      h('div',{style:{display:'flex',flexDirection:'column',gap:10,width:180,paddingTop:16}},
        h('div',{style:{fontSize:12,fontWeight:500,color:'var(--color-text-primary)'}},
          hasSel?`${selSet.size} ${selType} thread${selSet.size>1?'s':''} selected`:'Thread colors'
        ),
        hasSel&&h('div',null,
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:3,marginBottom:5}},
            selColors.slice(0,MAX_CHIPS).map((c,i)=>
              h('div',{key:i,title:`Thread ${sortedIdx[i]+1}: ${c}`,style:{
                width:14,height:14,background:c,borderRadius:2,
                border:'0.5px solid var(--color-border-secondary)',cursor:'default',
              }})
            ),
            selColors.length>MAX_CHIPS&&h('span',{style:{fontSize:10,color:'var(--color-text-tertiary)',alignSelf:'center'}},`+${selColors.length-MAX_CHIPS}`)
          ),
          allSame
            ?h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'5px 7px',
                border:'0.5px solid var(--color-border-tertiary)',borderRadius:5,
                background:'var(--color-background-secondary)'}},
                h('div',{style:{width:16,height:16,background:sharedColor,borderRadius:2,flexShrink:0,border:'0.5px solid var(--color-border-secondary)'}}),
                h('span',{style:{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--color-text-secondary)'}},sharedColor?.toUpperCase())
              )
            :h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',fontStyle:'italic'}},'Mixed — pick to unify')
        ),
        !hasSel&&h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',lineHeight:1.7}},
          'Click thread swatches to select — then pick a color below to apply to all selected.'
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,24px)',gap:3}},
          PALETTE.map(c=>h('div',{key:c,onClick:()=>pickColor(c),style:{
            width:24,height:24,background:c,borderRadius:3,boxSizing:'border-box',
            cursor:hasSel?'pointer':'default',opacity:hasSel?1:0.3,
            border:c===sharedColor?'2.5px solid var(--color-text-primary)':'2.5px solid transparent',
          }}))
        ),
        hasSel&&h('div',{style:{display:'flex',flexDirection:'column',gap:5}},
          smBtn(`Select all ${selType} threads`,selectAll,false),
          smBtn('Deselect all',deselectAll,true)
        )
      )
    ),

    /* ── Cloth simulation canvas ── */
    h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginBottom:8}},
      `Simulated cloth — ${FW}×${FH} threads, tiled from draft`
    ),
    h('canvas',{ref:cvRef,style:{display:'block',borderRadius:4,border:'0.5px solid var(--color-border-tertiary)'}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(DigitalLoom));
</script>
</body>
</html>
